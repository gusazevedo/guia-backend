services:
  postgres:
    image: postgres:16-alpine
    container_name: guia-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: guia
      POSTGRES_PASSWORD: guia
      POSTGRES_DB: guia
    ports:
      - '5432:5432'
    volumes:
      - guia-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U guia -d guia']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  guia-pgdata:
